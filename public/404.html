<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada | Contabilidade Zen</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="A página que você procura não foi encontrada. Volte para a página inicial da Contabilidade Zen.">
  <link rel="canonical" href="https://www.contabilidadezen.com.br/">
  <link rel="icon" type="image/png" href="/favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: #0d9488;
      line-height: 1;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      color: #1e293b;
      margin-bottom: 0.75rem;
    }
    p {
      color: #64748b;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #0d9488;
      color: white;
    }
    .btn-primary:hover {
      background: #0f766e;
    }
    .btn-outline {
      border: 1px solid #e2e8f0;
      color: #475569;
      background: white;
    }
    .btn-outline:hover {
      border-color: #0d9488;
      color: #0d9488;
    }
    .suggestions {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #e2e8f0;
    }
    .suggestions h2 {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .suggestions ul {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }
    .suggestions a {
      color: #0d9488;
      text-decoration: none;
      font-size: 0.875rem;
      padding: 0.25rem 0.75rem;
      background: #f0fdfa;
      border-radius: 9999px;
    }
    .suggestions a:hover {
      background: #ccfbf1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1>Página não encontrada</h1>
    <p>A página que você está procurando pode ter sido removida, teve seu nome alterado ou está temporariamente indisponível.</p>
    
    <div class="links">
      <a href="/" class="btn btn-primary">Voltar para a Home</a>
      <a href="https://wa.me/5511999999999?text=Ol%C3%A1!%20Encontrei%20um%20erro%20no%20site." class="btn btn-outline">Falar no WhatsApp</a>
    </div>

    <div class="suggestions">
      <h2>Páginas populares</h2>
      <ul>
        <li><a href="/servicos">Serviços</a></li>
        <li><a href="/abrir-empresa">Abrir Empresa</a></li>
        <li><a href="/blog">Blog</a></li>
        <li><a href="/contato">Contato</a></li>
        <li><a href="/segmentos/contabilidade-para-medicos">Para Médicos</a></li>
      </ul>
    </div>
  </div>
</body>
</html>
