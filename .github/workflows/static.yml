name: Build, Pre-render & Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: npm run build

      - name: Inject dynamic blog links into index.html
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: node scripts/inject-blog-links.mjs

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Pre-render static pages
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: node scripts/prerender.mjs

      - name: Sync dynamic sitemap to dist
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          echo "📡 Fetching dynamic sitemap from edge function..."
          SITEMAP_URL="${VITE_SUPABASE_URL}/functions/v1/sitemap"
          HTTP_CODE=$(curl -s -o dist/sitemap.xml -w "%{http_code}" \
            -H "apikey: ${VITE_SUPABASE_PUBLISHABLE_KEY}" \
            -H "Authorization: Bearer ${VITE_SUPABASE_PUBLISHABLE_KEY}" \
            "$SITEMAP_URL")
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Dynamic sitemap saved to dist/sitemap.xml ($(wc -c < dist/sitemap.xml) bytes)"
          else
            echo "⚠️  Edge function returned HTTP $HTTP_CODE — keeping static sitemap.xml from build"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=contabilidade-zen
